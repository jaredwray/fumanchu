name: code-coverage

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  code-coverage:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Install pnpm
      uses: pnpm/action-setup@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install Dependencies
      run: pnpm install

    - name: Build
      run: pnpm build

    - name: Testing
      run: pnpm test:ci

    - name: Code Coverage
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_KEY }}
        verbose: true
        files: ./coverage/lcov.info