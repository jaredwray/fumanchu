name: release

on:
  workflow_dispatch:
  release:
    types: [released]

permissions:
  contents: read
  id-token: write

jobs:
  setup-build-release:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Install pnpm
      uses: pnpm/action-setup@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'

    - name: Install Dependencies
      run: pnpm install

    - name: Build
      run: pnpm build

    - name: Testing
      run: pnpm test:ci

    # Publishes to npm via OIDC trusted publishing with provenance (no NPM_TOKEN).
    # Requires a trusted publisher to be configured for this workflow at
    # https://www.npmjs.com/package/@jaredwray/fumanchu/access
    - name: Publish
      run: pnpm publish --provenance --access public --no-git-checks --ignore-scripts
